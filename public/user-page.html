<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer" />
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css">
    <link rel="stylesheet" href="./css/user-page.css">
</head>
<body>
    <header>
        <div class="logo">
            <i class="fa-regular fa-bookmark"></i>
            <span>BookmarkIt</span>
        </div>
        <div class="user-logout"> 
            <p class="user-mail" id="user-mail">alex@gmail.com</p>
            <button class="log-out" id="log-out">Log out</button>
        </div>
    </header>
    <main>
        <div class="left-container">
            <p>FILTER</p>
            <div class="s-item">
                <div class="s-item-left">
                    <i class="ti ti-layout-list"></i>
                    <span>All</span>
                </div>
                <div class="s-count">12</div>
            </div>
            <div class="s-item">
                <div class="s-item-left">
                    <i class="ti ti-star"></i>
                    <span>Favourites</span>
                </div>
                <div class="s-count">3</div>
            </div>
        <div class="hr"></div>      
        <p>BY TAG</p>
            <div class="s-item">
                <div class="s-item-left">
                    <div class="round blue"></div>
                    <p>article</p>
                </div>  
                <div class="s-count">5</div>
            </div>
            <div class="s-item">
                <div class="s-item-left">
                    <div class="round purple"></div>
                    <p>tool</p>
                </div>  
                <div class="s-count">4</div>
            </div>
            <div class="s-item">
                <div class="s-item-left">
                    <div class="round orange"></div>
                    <p>video</p>
                </div>  
                <div class="s-count">2</div>
            </div>
            <div class="s-item">
                <div class="s-item-left">
                    <div class="round green"></div>
                    <p>reference</p>
                </div>  
                <div class="s-count">1</div>
            </div>
        </div>
        <div class="right-container">
            <div class="search-add-div">
                <input type="text" class="search-input" name="search-input" id="" aria-label="search for your bookmark" placeholder="Search bookmarks...">
                <a href="add-bookmark.html" class="add-bookmark"><i class="ti ti-plus"></i> Add bookmark </a>
            </div>
            <div class="stats-row">
                <div class="stat">
                    <span class="twelve">12</span>
                    <p>Total saved</p>
                </div>
                <div class="stat">
                    <span class="blue-num">5</span>
                    <div class="stat-i">
                        <div class="round blue"></div>
                        <p>Articles</p>
                    </div>
                </div>
                <div class="stat">
                    <span class="purple-num">4</span>
                    <div class="stat-i">
                        <div class="round purple"></div>
                        <p>Tools</p>
                    </div>
                </div>
                 <div class="stat">
                    <span class="orange-num">3</span>
                    <div class="stat-i">
                        <div class="round orange"></div>
                        <p>Favourites</p>
                    </div>
                </div>
            </div>
            <div class="bookmarks-container"></div>
        </div>
    </main>
    <script src="./js/user-page.js" type="module"></script>
</body>
</html>
