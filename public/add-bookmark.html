<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer" />
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/add-bookmark.css">

</head>
<body>
    <header>
        <div class="logo">
            <i class="fa-regular fa-bookmark"></i>
            <span>BookmarkIt</span>
        </div>
        <div class="user-logout">
            <p class="user-mail" id="user-mail"></p>
            <button class="log-out" id="log-out">Log out</button>
        </div>
    </header>
    <main>
        <div class="left-container">
            <p>FILTER</p>
            <div class="s-item">
                <div class="s-item-left">
                    <i class="ti ti-layout-list"></i>
                    <span>All</span>
                </div>
                <div class="s-count">12</div>
            </div>
            <div class="s-item">
                <div class="s-item-left">
                    <i class="ti ti-star"></i>
                    <span>Favourites</span>
                </div>
                <div class="s-count">3</div>
            </div>
          <div class="hr"></div>      
            <p>BY TAG</p>
            <div class="s-item">
                <div class="s-item-left">
                    <div class="round blue"></div>
                    <p>article</p>
                </div>  
                <span class="s-count">5</span>
            </div>
            <div class="s-item">
                <div class="s-item-left">
                    <div class="round purple"></div>
                    <p>tool</p>
                </div>  
                <span class="s-count">4</span>
            </div>
            <div class="s-item">
                <div class="s-item-left">
                    <div class="round orange"></div>
                    <p>video</p>
                </div>  
                <spa class="s-count">2</span>
            </div>
            <div class="s-item">
                <div class="s-item-left">
                    <div class="round green"></div>
                    <p>reference</p>
                </div>  
                <span class="s-count">1</span>
            </div>
        </div>
        <div class="right-container">
            <h1 class="form-title">Add a bookmark
                <br>
            <span class="sub-title">Paste a link, give it a tag, and save it to your collection.</span>
            </h1>
            <form id="bookmark-form">
                <div>
                    <label for="title-input">TITLE</label>
                    <input type="text" name="title-input" id="title-input" required>
                </div>
                <div>
                    <label for="url-input">URL</label>
                    <input type="url" id="url-input" name="url-input" required>
                </div>
                <div>
                    <label for="">TAG</label>
                    <div class="tags" id="tags">
                        <div class="tag-type">
                            <i class="ti ti-tool"></i>
                            <span class="tag-type-text">tool</span>
                        </div>
                        <div class="tag-type">
                            <i class="ti ti-article"></i>
                            <span class="tag-type-text">article</span>
                        </div>
                        <div class="tag-type">
                            <i class="ti ti-video"></i>
                            <span class="tag-type-text">video</span>
                        </div>
                        <div class="tag-type">
                            <i class="ti ti-book"></i>               
                            <span class="tag-type-text">reference</span>
                        </div>
                    </div>
                </div>
                <div>
                    <label for="">MARK AS FAVORITE?</label>
                    <div class="fav-toggle" id="fav-toggle">
                        <i class="ti ti-star-filled" aria-hidden="true"></i>
                        <div class="fav-text">
                            <p class="strong" id="fav-text-strong">Yes, add to favorites</p>
                            <span>Click to toggle</span>
                        </div>
                    </div>
                </div>
                <div class="nav-bottom">
                    <a href="user-page.html">Cancel</a>
                    <button><i class="ti ti-bookmark"></i> Save bookmark</button>
                </div>
                <div id="error-message" class="error-message"></div>
            </form>
        </div>
    </main>
    <script src="js/add-bookmark.js" type="module"></script>
</body>
</html>
