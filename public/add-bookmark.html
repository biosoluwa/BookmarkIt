<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css">

</head>
<body>
    <header>
        <div class="logo">
            <i class="fa-regular fa-bookmark"></i>
            <span>BookmarkIt</span>
        </div>
        <div>
            <p></p>
            <button>Log out</button>
        </div>
    </header>
    <main>
        <div class="left-container">
            <p>FILTER</p>
            <div>
                <div>
                    <i class="ti ti-layout-list"></i>
                    <span>All</span>
                </div>
                <div>12</div>
            </div>
            <div>
                <i class="ti ti-star"></i>
                <span>Favourites</span>
            </div>
            <div>3</div>
            <hr>
            <p>BY TAG</p>
            <div>
                <div>
                    <div></div>
                    <p>article</p>
                </div>  
                <span>5</span>
            </div>
            <div>
                <div>
                    <div></div>
                    <p>tool</p>
                </div>  
                <span>4</span>
            </div>
            <div>
                <div>
                    <div></div>
                    <p>video</p>
                </div>  
                <span>2</span>
            </div>
            <div>
                <div>
                    <div></div>
                    <p>reference</p>
                </div>  
                <span>1</span>
            </div>
        </div>
        <div class="right-container">
            <h1>Add a bookmark</h1>
            <p>Paste a link, give it a tag, and save it to your collection.</p>
            <form action="">
                <div>
                    <label for="title">TITLE</label>
                    <input type="text" name="" id="">
                </div>
                <div>
                    <label for="">URL</label>
                    <input type="url">
                    <div class="link-preview">Link preview fetched automatically</div>
                </div>
                <div>
                    <label for="">TAG</label>
                    <div>
                        <i class="ti ti-tool"></i>
                        <span>tool</span>
                    </div>
                     <div>
                        <i class="ti ti-article"></i>
                        <span>article</span>
                    </div>
                     <div>
                        <i class="ti ti-video"></i>
                        <span>video</span>
                    </div>
                     <div>
                        <i class="ti ti-book"></i>               
                        <span>reference</span>
                    </div>
                </div>
                <div>
                    <label for="">MARK AS FAVORITE?</label>
                    <div>
                        <i class="ti ti-star-filed" aria-hidden="true"></i>
                        <div>
                            <strong>Yes, add to favorites</strong>
                            "Click to toggle"
                        </div>
                    </div>
                </div>
                <div>
                    <a href="user-page.html">Cancel</a>
                    <button><i class="ti ti-bookmark"></i> Save bookmark</button>
                </div>
            </form>
        </div>
    </main>
</body>
</html>
